<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Addon Order</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f7fa;
    }
    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      background: #fff;
      max-width: 500px;
      margin: 2rem auto;
    }
    .card-header {
      background: linear-gradient(135deg, #4f6fe0, #3a5299);
      color: #fff;
      padding: 1.5rem;
      border-radius: 16px 16px 0 0;
    }
    .card-body { padding: 2rem; }
    .form-label { font-weight: 500; color: #495057; margin-bottom: 0.5rem; }
    .form-control, .form-select {
      border-radius: 8px;
      padding: 0.7rem 1rem;
      border: 1px solid #dee2e6;
    }
    .btn-primary {
      background: #4f6fe0;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 8px;
    }
    @media (max-width: 991px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        z-index: 1050;
        width: 260px !important;
      }
      .sidebar.show {
        transform: translateX(0);
      }
      .sidebar-backdrop {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.5);
        z-index: 1040;
      }
      .sidebar-backdrop.show {
        display: block;
      }
      .main-content {
        margin-left: 0 !important;
        width: 100%;
      }
      .mobile-nav-btn {
        display: flex !important;
      }
      .top-bar {
        padding: 1rem !important;
      }
      .top-bar h1 {
        font-size: 1.3rem;
      }
    }
    @media (max-width: 767px) {
      .table-responsive {
        font-size: 0.85rem;
      }
      .card-body {
        padding: 1rem !important;
      }
    }
    .mobile-nav-btn {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1030;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      border: none;
      box-shadow: 0 4px 15px rgba(79, 111, 224, 0.4);
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .table-responsive {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .table {
      min-width: 600px;
    }
  </style>
</head>
<body>
  <!-- Sidebar Backdrop for Mobile -->
  <div class="sidebar-backdrop" onclick="toggleSidebar()"></div>

  <!-- Mobile Navigation Button -->
  <button class="mobile-nav-btn" onclick="toggleSidebar()">
    <i class="bi bi-list"></i>
  </button>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <h4><i class="bi bi-pencil me-2"></i>Edit Addon Order</h4>
      </div>
      <div class="card-body">
        <form action="{{ url_for('update_addon_order', id=order.id) }}" method="POST">
          <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" name="quantity" value="{{ order.quantity }}" min="1" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" step="0.01" name="price" value="{{ order.price }}" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
              <option value="pending" {% if order.status == 'pending' %}selected{% endif %}>Pending</option>
              <option value="confirmed" {% if order.status == 'confirmed' %}selected{% endif %}>Confirmed</option>
              <option value="delivered" {% if order.status == 'delivered' %}selected{% endif %}>Delivered</option>
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-2"></i>Save Changes</button>
            <a href="{{ url_for('addon_orders') }}" class="btn btn-light">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const backdrop = document.querySelector('.sidebar-backdrop');
      if (sidebar && backdrop) {
        sidebar.classList.toggle('show');
        backdrop.classList.toggle('show');
      }
    }

    document.addEventListener('click', function(e) {
      const sidebar = document.getElementById('sidebar');
      const backdrop = document.querySelector('.sidebar-backdrop');
      if (window.innerWidth < 992 && sidebar && backdrop && !sidebar.contains(e.target) && !e.target.classList.contains('mobile-nav-btn') && sidebar.classList.contains('show')) {
        sidebar.classList.remove('show');
        backdrop.classList.remove('show');
      }
    });
  </script>
</body>
</html>
